# YaneuraOu ⇔ rshogi SPSA パラメータマッピング表
#
# このファイルは正本となる対応表。`build_param_mapping` で初期生成後、
# `tune/suisho10.tune` のソースコンテキスト解析と rshogi 側 `tune_params.rs`
# のレビューで人手確定したもの。
#
# - sign_flip = true : YO 式 `-X *` を rshogi 側で値の符号に内包（例: NMP_MARGIN_OFFSET）
#   YO 値 X に対し rshogi 値は -X となる
# - 行コメント : 元の YO 式抜粋（[[mapping]] 直前に置く）
# - unmapped.yo : rshogi 側に対応がない YO パラメータ（現状なし）
# - unmapped.rshogi : suisho10 から転記対象でない rshogi 独自パラメータ

# === Correction value ===
# return 9536@ * pcv + 8494@ * micv + 10132@ * (wnpcv + bnpcv) + 7156@ * cntcv;
[[mapping]]
yo = "correction_value_1"
rshogi = "SPSA_CORR_PCV_WEIGHT"
sign_flip = false

[[mapping]]
yo = "correction_value_2"
rshogi = "SPSA_CORR_MICV_WEIGHT"
sign_flip = false

[[mapping]]
yo = "correction_value_3"
rshogi = "SPSA_CORR_NONPAWN_WEIGHT"
sign_flip = false

[[mapping]]
yo = "correction_value_4"
rshogi = "SPSA_CORR_CNT_WEIGHT"
sign_flip = false

# === update_correction_history ===
# constexpr int nonPawnWeight = 165@;
[[mapping]]
yo = "update_correction_history_nonPawnWeight_1"
rshogi = "SPSA_CORR_HIST_NONPAWN"
sign_flip = false

# minor << bonus * 156@ / 128;
[[mapping]]
yo = "update_correction_history1_1"
rshogi = "SPSA_CORR_HIST_MINOR"
sign_flip = false

# (ss-2)->cont << bonus * 137@ / 128;
[[mapping]]
