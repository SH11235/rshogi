# delta = 5@ + threadIdx % 8 + std::abs(meanSquaredScore) / 9000@;
[[mapping]]
yo = "aspiration_window_1"
rshogi = "SPSA_ASP_DELTA_BASE"
sign_flip = false

[[mapping]]
yo = "aspiration_window_2"
rshogi = "SPSA_ASP_MEAN_SQ_DIV"
sign_flip = false

