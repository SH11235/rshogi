# h.fill(-529@); (continuation history)
[[mapping]]
yo = "YaneuraOuWorker_clear2_1"
rshogi = "SPSA_CONT_HIST_INIT"
sign_flip = false

# reductions[i] = int(2809@ / 128.0 * std::log(i));
[[mapping]]
