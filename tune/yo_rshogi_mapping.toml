rshogi = "SPSA_CORR_HIST_CONT_SS2"
sign_flip = false

# (ss-4)->cont << bonus * 64@ / 128;
[[mapping]]
yo = "update_correction_history2_2"
rshogi = "SPSA_CORR_HIST_CONT_SS4"
sign_flip = false

