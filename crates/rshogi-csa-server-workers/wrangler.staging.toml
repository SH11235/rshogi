# Cloudflare Workers staging デプロイ設定 (CI 経由 `wrangler deploy` で使用)。
#
# - 本ファイルは VCS で追跡される。`account_id` / `CLOUDFLARE_API_TOKEN` 等の
#   秘匿情報は **入れない**。これらは GitHub Environments の secret から CI
#   runtime で env 経由で注入する (`CLOUDFLARE_ACCOUNT_ID` /
#   `CLOUDFLARE_API_TOKEN`、staging environment 側に登録された値)。
# - bucket 名 / Origin / 時計設定など秘匿情報でない値はそのままコミットする。
# - 本ファイルは production (`wrangler.production.toml`) と同じ shape を維持し、
#   `name` と R2 `bucket_name` のみ staging 専用値に書き換える。値の意味と
#   `[vars]` 各キーの意図は production toml の同等行に合わせる（差分は最小化）。
# - 値変更手順 / 初回セットアップ手順は `docs/csa-server/deployment.md` を参照。

name = "rshogi-csa-server-workers-staging"
main = "build/worker/shim.mjs"
# 通常は production と日付を揃え、新フラグ採用は両環境同時に bump する運用で
# 挙動差を最小化する。staging で先に新 flag の挙動を観察してから production に
# 反映したい場合に限り、本値を意図的に production より先行させて良い（その場合
# 観察期間中は staging / production で compatibility 動作が乖離する点に注意）。
compatibility_date = "2026-04-21"

# CI 環境では事前に `cargo install -q worker-build@^0.8 --locked` がインストール済みの
# 前提（`.github/workflows/deploy-workers.yml` の独立 step `Install worker-build` で
# `actions/cache` 経由 hit 時 skip + miss 時 install を行う）。本ファイルは
# `worker-build --release` のみを実行することで、CI 1 回 deploy あたりの時間を短縮する。
[build]
command = "worker-build --release"

# --- Durable Objects ---
# GameRoom: 1 room_id = 1 DO インスタンス。`id_from_name(room_id)` で決定論解決。
# Worker `name` が staging 専用なので DO namespace も自動で staging 隔離される
# （production の GameRoom storage には触れない）。
[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoom"

# Lobby: マッチング待機キューとペアリング判定を担当する 1 instance 固定 DO。
# `id_from_name("default")` で routing する。in-memory queue のみ保持し、
# Hibernation 復帰時は client が再 LOGIN_LOBBY する想定で永続化はしない。
[[durable_objects.bindings]]
name = "LOBBY"
class_name = "Lobby"

# SQLite-backed DO: `state.storage().sql()` を利用するため必須。
# 本 migration tag は **初回 deploy 時にのみ apply される**。`new_sqlite_classes` の
# 内容を変更する場合は新 tag (`v2` / `v3` ...) を **追加する** こと。既存 tag を
# 編集しても無視される。staging / production で migration 履歴は独立しているため、
# 同じ tag を両環境で持っていても干渉しない。
[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]

# Lobby を SQLite-backed として追加 (storage 利用予定はないが将来の queue TTL 永続化
# 等を見据えて SQLite クラスとして登録しておく)。
[[migrations]]
tag = "v2"
new_sqlite_classes = ["Lobby"]

# --- R2: 棋譜保存 ---
# `GameRoom` DO が終局時に CSA V2 棋譜を書き出す先。staging 用 bucket は事前に
# Cloudflare 上で作成しておく必要がある:
#   wrangler r2 bucket create rshogi-csa-kifu-staging
# 命名規約 (Cloudflare): 小文字英数字 + ハイフン、3〜63 文字、先頭末尾は英数字。
[[r2_buckets]]
binding = "KIFU_BUCKET"
bucket_name = "rshogi-csa-kifu-staging"

# --- R2: Floodgate 履歴保存 ---
#   wrangler r2 bucket create rshogi-csa-floodgate-history-staging
[[r2_buckets]]
binding = "FLOODGATE_HISTORY_BUCKET"
bucket_name = "rshogi-csa-floodgate-history-staging"

# --- 環境変数 ---
# `[vars]` の値は機密でないが、staging client の Origin に応じて運用者が更新する。
# 値変更は通常の PR で行い、merge → 自動 deploy で反映される。
[vars]
# WebSocket Upgrade 時の Origin 許可リスト（カンマ区切り）。ブラウザ経由
# （Origin ヘッダ付き）に対する CSRF 防御として機能する。
# 空文字列・未設定時はブラウザ経由を全 403、Origin ヘッダを送らない
# ネイティブ CSA クライアントは素通し。
# staging では本リポ csa_client の `ws_origin` 既定値と合わせ、Origin 付きで
# 実機 E2E が通電できる値を入れておく。web client URL が確定したら追記する。
WS_ALLOWED_ORIGINS = "https://csa-client-local"

# 対局時計の方式と値。
# - `countdown`: CSA 2014 改訂互換、整数秒切り捨て、Floodgate 互換 (`Time_Unit:1sec`)。
# - `countdown_msec`: ms 粒度の短時間対局向け拡張 (`Time_Unit:1msec`)。
#   本リポ独自で本家 Floodgate には無い。staging では実機 E2E と CI E2E を素早く回す
#   ために CountdownMsec で `byoyomi=100ms` 程度に短縮する運用。
# - `fischer`: 秒単位の増分加算。
# - `stopwatch`: 分単位切り捨ての shogi-server 旧挙動。
#
# 各バリアントが参照する env 変数:
#   countdown      → TOTAL_TIME_SEC / BYOYOMI_SEC
#   countdown_msec → TOTAL_TIME_MS  / BYOYOMI_MS
#   fischer        → TOTAL_TIME_SEC / BYOYOMI_SEC (BYOYOMI_SEC は increment)
#   stopwatch      → TOTAL_TIME_MIN / BYOYOMI_MIN
CLOCK_KIND = "countdown_msec"
# countdown 系（参照されない側も SHARED_PUBLIC_VARS_KEYS の整合性のため宣言する）。
TOTAL_TIME_SEC = "600"
BYOYOMI_SEC = "10"
# countdown_msec で使う実値: 持ち時間 10 秒、秒読み 100ms（実機 E2E と CI E2E で
# 1 局を数秒〜十数秒で完走させる速度を狙う）。
TOTAL_TIME_MS = "10000"
BYOYOMI_MS = "100"
# stopwatch 系（参照されない）。
TOTAL_TIME_MIN = "10"
BYOYOMI_MIN = "1"

# 切断時の再接続猶予秒数。`0` または未設定で再接続プロトコルを無効化（保守的既定）。
# `> 0` を指定する構成は ALLOW_FLOODGATE_FEATURES=true との同時設定が必須。
# staging では reconnect protocol / history bucket / rating 応答などの Floodgate 系
# 拡張機能を実機通電させるため 30 秒に設定する。値の根拠: 手動 kill→再起動で
# `id` 文字列を組み立て直す operator 余裕 (10〜15 秒) と短時間ネットワーク blip の
# 吸収を兼ねる経験的下限。production 昇格時は実運用 client の再接続所要時間を
# 計測してから再評価する。
RECONNECT_GRACE_SECONDS = "30"
ALLOW_FLOODGATE_FEATURES = "true"
# LobbyDO 内 in-memory queue の総数上限。staging では小規模通電向けに 100 で運用。
LOBBY_QUEUE_SIZE_LIMIT = "100"

# --- secret として設定する値 ---
# staging で必要だが OSS repo には書かない値は `wrangler secret put` 経由で設定する。
# 実値は Cloudflare 側の secret store にのみ存在し、`env.var(name)` 経由で
# `[vars]` と同じ namespace から Worker code が読む（Cloudflare 仕様）。
#
# - ADMIN_HANDLE: `%%SETBUOY` / `%%DELETEBUOY` を許可する運営ハンドル名。
#   production と異なる値にすることで「staging で漏れた handle が production に
#   通用しない」分離を保つ。
#   設定: `vp exec wrangler secret put ADMIN_HANDLE --config wrangler.staging.toml`
#   確認: `vp exec wrangler secret list --config wrangler.staging.toml`
#   詳細は `docs/csa-server/deployment.md` 参照。
