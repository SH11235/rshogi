name: Rust CI

on:
  push:
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/rust-ci.yml'
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  # `.cargo/config.toml` の `target-cpu=native` を CI では無効化する。
  # CI ランナーの CPU 世代（Skylake / Ice Lake / Cascade Lake 等）と sccache の
  # 組み合わせで、片方の CPU でビルドされたキャッシュエントリが別 CPU の
  # runner で実行されて SIGILL（`Compile terminated by signal 4`）で落ちる
  # flaky を起こしていた。CI では CPU 固有命令を出さない `x86-64-v2` 相当の
  # 保守的な baseline を指定し、sccache エントリを CPU 非依存にする。
  # ローカル開発の `target-cpu=native` は `.cargo/config.toml` 側で維持され、
  # CI のみがこの env で override される（env の方が `.cargo/config.toml` の
  # rustflags より precedence が高い）。
  RUSTFLAGS: "-C target-cpu=x86-64-v2"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust_code: ${{ steps.filter.outputs.rust_code }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust_code:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'build.rs'
              - 'crates/**'
              - '.cargo/**'
              - '!docs/**'
              - '!runs/**'
              - '!logs/**'
              - '!target/**'
              - '!data/**'
              - '!memo/**'
              - '!**/*.md'
              - '!**/*.mdx'

  format:
    name: Format Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust_code == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  lint:
    name: Clippy Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust_code == 'true'
    steps:
      - uses: actions/checkout@v5
      - name: Install mold linker
        run: |
          sudo apt-get update
          sudo apt-get install -y mold clang
          mold --version || true
          clang --version || true
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Enable sccache
        run: echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust_code == 'true'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Install mold linker
        run: |
          sudo apt-get update
          sudo apt-get install -y mold clang
          mold --version || true
          clang --version || true
      - uses: dtolnay/rust-toolchain@stable
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Enable sccache
        run: echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Run tests
        run: cargo test --release --workspace -- --test-threads=2
      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust_code == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - name: Run security audit
        run: cargo audit --deny warnings
