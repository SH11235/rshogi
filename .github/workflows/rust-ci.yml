name: Rust CI

on:
  push:
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/rust-ci.yml'
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  # `.cargo/config.toml` の `target-cpu=native` を CI では無効化する。
  # CI ランナーの CPU 世代（Skylake / Ice Lake / Cascade Lake 等）と sccache の
  # 組み合わせで、片方の CPU でビルドされたキャッシュエントリが別 CPU の
  # runner で実行されて SIGILL（`Compile terminated by signal 4`）で落ちる
  # flaky を起こしていた。CI では CPU 固有命令を出さない `x86-64-v2` 相当の
  # 保守的な baseline を指定し、sccache エントリを CPU 非依存にする。
  # ローカル開発の `target-cpu=native` は `.cargo/config.toml` 側で維持され、
  # CI のみがこの env で override される（env の方が `.cargo/config.toml` の
  # rustflags より precedence が高い）。
  RUSTFLAGS: "-C target-cpu=x86-64-v2"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust_code: ${{ steps.filter.outputs.rust_code }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust_code:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'build.rs'
              - 'crates/**'
              - '.cargo/**'
              - '!docs/**'
              - '!runs/**'
              - '!logs/**'
              - '!target/**'
              - '!data/**'
              - '!memo/**'
              - '!**/*.md'
              - '!**/*.mdx'

  format:
    name: Format Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust_code == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  lint:
    name: Clippy Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust_code == 'true'
    steps:
      - uses: actions/checkout@v5
      - name: Install mold linker
        run: |
          sudo apt-get update
          sudo apt-get install -y mold clang
          mold --version || true
          clang --version || true
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Enable sccache
        run: echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust_code == 'true'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Install mold linker
        run: |
          sudo apt-get update
          sudo apt-get install -y mold clang
          mold --version || true
          clang --version || true
      - uses: dtolnay/rust-toolchain@stable
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Enable sccache
        run: echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Run tests
        run: cargo test --release --workspace -- --test-threads=2
      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust_code == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - name: Run security audit
        run: cargo audit --deny warnings

  wasm-build:
    # Workers crate (`rshogi-csa-server-workers`) の wasm32-unknown-unknown ビルドを検査する。
    #
    # 既存 `lint` / `test` job は host target でしか動かないため、
    # `#[cfg(target_arch = "wasm32")]` 配下のコード（`game_room.rs` / `router.rs` /
    # `lib.rs` の本体）は merge 前に検証されない。本番 deploy 直前の
    # `worker-build --release` で初めて wasm32 ビルド退行が発覚する運用を防ぐため、
    # PR チェックで wasm32 ビルド検査を並走させる。
    #
    # `cargo check` ではなく `cargo build` を使う:
    #   `cargo check` は MIR 生成までで止まり codegen 段の退行（wasm-bindgen の
    #   symbol 衝突・`getrandom` の wasm_js feature 不足・lld link error 等）を
    #   検知できない。本 job の目的は「`worker-build --release` で初めて発覚する
    #   退行を PR で止める」なので codegen を通す build を使う。
    #
    # mold / clang を入れない:
    #   wasm32 は lld でリンクするため、host job (`lint` / `test`) が入れている
    #   mold linker は不要。runner セットアップ時間を浪費しない。
    #
    # clippy を回さない:
    #   clippy は host target の `lint` job で全 crate を網羅済み。本 job の責務は
    #   「Workers crate の wasm32 ビルドが通ること」の回帰検知に限定し、
    #   `rshogi-core` の wasm32 clippy 整理など別 crate 範囲の lint 課題は扱わない。
    name: Workers wasm32 Build Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust_code == 'true'
    timeout-minutes: 20
    env:
      # workflow 上位の `-C target-cpu=x86-64-v2` は x86 専用で wasm32 では
      # `'x86-64-v2' is not a recognized processor for this target (ignoring processor)`
      # 警告がコンパイル単位ごとに大量出力される。本 job では空文字で上書きし、
      # wasm32 標準の codegen に任せる（host target 用の baseline 設定の意図とも整合）。
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Enable sccache
        run: echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          # host target キャッシュ (`lint` / `test` job) と完全分離する。
          # `shared-key` 指定で本 job 専用のキャッシュ namespace を確保し、
          # 同 base key 配下に host target sysroot が混入しないようにする。
          shared-key: wasm32
      - name: Build wasm32
        run: cargo build -p rshogi-csa-server-workers --target wasm32-unknown-unknown
      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
